    }catch(_e){}</script></head><body class="min-h-screen flex flex-col font-body-md text-on-surface">
    <!-- Main Content -->
    <main class="flex-grow flex items-center justify-center px-md py-2xl">

            </div>
            
            <!-- Authentication Card -->
            <div class="auth-card p-xl rounded-lg">
                <div class="mb-lg">
                    <h2 class="font-headline-md text-headline-md text-on-surface mb-xs">Sign In</h2>
                    
                </div>
                
                <form action="#" class="space-y-lg" method="POST"><!-- Email Field -->
                    <div class="space-y-xs">
                        <label class="block font-body-sm font-semibold text-on-surface-variant px-xs" for="email">Email Address</label>
                        <div class="relative">
                            <span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline pointer-events-none">mail</span>
                            <input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg py-md pl-xl pr-md font-body-md focus:outline-none focus:border-primary transition-colors" id="email" name="email" placeholder="name@company.com" required="" type="email">
                        </div>
                    </div>
                    
                    <!-- Password Field -->
                    <div class="space-y-xs">
                        <div class="flex justify-between items-center px-xs">
                            <label class="block font-body-sm font-semibold text-on-surface-variant" for="password">Password</label>
                            <a class="text-body-sm font-semibold text-primary hover:underline" href="#">Forgot?</a>
                        </div>
                        <div class="relative">
                            <span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline pointer-events-none">lock</span>
                            <input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg py-md pl-xl pr-md font-body-md focus:outline-none focus:border-primary transition-colors" id="password" name="password" placeholder="••••••••" required="" type="password">
                        </div>
                    </div>
                    <!-- Email Field -->
                    
                    
                    <!-- Password Field -->
                    
                    
                    <!-- Submit Button -->
                    <button class="w-full bg-primary text-on-primary font-body-md font-semibold py-md px-lg rounded-lg hover:opacity-90 transition-opacity flex items-center justify-center gap-sm shadow-sm" type="submit">
                        Sign In
                        
                    </button>
                </form>
            </div><!-- Footer Link -->
            <div class="text-center mt-lg">
                <p class="font-body-sm text-on-surface-variant">
                    Don't have an account? 
                    <a class="font-semibold text-primary hover:underline" href="#">Register Now</a>
                </p>
            </div>
            
            <!-- Footer Link -->
            
            
            <!-- Security Badge -->
            
        </div>
    </main>

    <!-- Visual Background Element -->

        </div>
        <div class="absolute -bottom-1/4 -left-1/4 w-1/2 h-1/2 opacity-[0.03]">
            <img class="w-full h-full object-contain" alt="Premium paper texture pattern" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAg2TknQN2OSWAdx77TPOtlOfPtarlw_UJ5zAUaTRRwv36IdTIb6uMzhIDY5cPBVhRjQbkn0oJ7CWb7NIV2KRyELTPHzDOgmlYsaVzItIh80-0QyOcFepY8-5Znn7w3e8M3obBrYZZNurJ_z2YhLpkhmGqj-0Pma95kZYN_iqG4VQRMWh6TDUmnIfJFpLq-_rpqOSrOWsPRN-INaUk4bhfeYMEEAT9lzbgJRltKUpGMOMBlNbFpJFX2Gw">
        </div>
    </div>

    <!-- Minimalist Footer -->
    

    <script>
        // Micro-interaction for input fields focus
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                const icon = input.parentElement.querySelector('.material-symbols-outlined');
                if (icon) icon.style.color = '#0F172A';
            });
            input.addEventListener('blur', () => {
                const icon = input.parentElement.querySelector('.material-symbols-outlined');
                if (icon) icon.style.color = '#76777d';
            });
        });

        // Form submission simulation
        document.querySelector('form').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span> Authenticating...';
            btn.disabled = true;
            
            setTimeout(() => {
                btn.innerHTML = '<span class="material-symbols-outlined">check_circle</span> Access Granted';
                btn.style.backgroundColor = '#006c49';
                setTimeout(() => {
                    alert('Login successful! Redirecting to dashboard...');
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                    btn.style.backgroundColor = '';
                }, 1000);
            }, 1500);
        });
    </script>

</body></html>
