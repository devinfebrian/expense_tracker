<body class="font-body-md text-on-surface">
<!-- Top Navigation Header -->
<header class="bg-background fixed top-0 w-full z-50">
<div class="flex justify-between items-center w-full px-md py-md max-w-container-max mx-auto">
<div class="flex items-center gap-sm"><span class="font-headline-md text-headline-md font-bold text-on-background">Duidku</span></div>
<a class="font-body-sm text-on-surface-variant hover:text-primary transition-colors" href="#">Support</a>
</div>
</header>
<main class="pt-[80px] pb-xl px-md min-h-screen flex flex-col justify-center">
<!-- Hero Section / Context -->
<div class="mb-xl text-center md:hidden">
<h1 class="font-headline-lg text-headline-lg text-on-background mb-sm">Create Account</h1>

</div>
<div class="max-w-md mx-auto w-full">
<div class="register-card p-xl rounded-xl shadow-sm">
<form class="space-y-lg" id="registerForm"><div class="space-y-lg">
  <div class="flex flex-col gap-sm">
    <label for="name" class="font-body-sm font-semibold text-on-surface-variant">Full Name</label>
    <input type="text" id="name" name="name" placeholder="Enter your full name" class="w-full p-md rounded-lg border border-outline-variant bg-surface-container-lowest focus:outline-none focus:ring-2 focus:ring-primary transition-all" required="">
  </div>
  <div class="flex flex-col gap-sm">
    <label for="email" class="font-body-sm font-semibold text-on-surface-variant">Email Address</label>
    <input type="email" id="email" name="email" placeholder="name@example.com" class="w-full p-md rounded-lg border border-outline-variant bg-surface-container-lowest focus:outline-none focus:ring-2 focus:ring-primary transition-all" required="">
  </div>
  <div class="flex flex-col gap-sm">
    <label for="password" class="font-body-sm font-semibold text-on-surface-variant">Password</label>
    <input type="password" id="password" name="password" placeholder="Create a strong password" class="w-full p-md rounded-lg border border-outline-variant bg-surface-container-lowest focus:outline-none focus:ring-2 focus:ring-primary transition-all" required="">
    <div class="flex gap-xs mt-xs">
      <div class="strength-segment flex-1 bg-surface-container"></div>
      <div class="strength-segment flex-1 bg-surface-container"></div>
      <div class="strength-segment flex-1 bg-surface-container"></div>
      <div class="strength-segment flex-1 bg-surface-container"></div>
    </div>
    <p class="text-body-sm text-on-surface-variant">Minimum 8 characters</p>
  </div>
</div><div class="pt-md"><button class="w-full py-md bg-primary text-on-primary font-semibold rounded-lg hover:opacity-90 active:scale-[0.98] transition-all shadow-md" type="submit">Create Account</button></div></form>
</div>
<!-- Trust Badge Mobile -->

</div>
</main>
<!-- Simple Footer -->

<script>
        // Password Strength Simulation
        const passwordInput = document.getElementById('password');
        const segments = document.querySelectorAll('.strength-segment');

        passwordInput.addEventListener('input', (e) => {
            const val = e.target.value;
            const length = val.length;
            
            // Reset
            segments.forEach(s => s.className = 'strength-segment flex-1 bg-surface-container');

            if (length > 0) {
                if (length < 6) {
                    segments[0].classList.add('bg-error');
                } else if (length < 10) {
                    segments[0].classList.add('bg-on-tertiary-container');
                    segments[1].classList.add('bg-on-tertiary-container');
                } else if (length < 12) {
                    segments[0].classList.add('bg-secondary');
                    segments[1].classList.add('bg-secondary');
                    segments[2].classList.add('bg-secondary');
                } else {
                    segments[0].classList.add('bg-secondary');
                    segments[1].classList.add('bg-secondary');
                    segments[2].classList.add('bg-secondary');
                    segments[3].classList.add('bg-secondary');
                }
            }
        });

        // Form Submission Micro-interaction
        document.getElementById('registerForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span>';
            
            setTimeout(() => {
                btn.innerHTML = 'Success!';
                btn.classList.replace('bg-primary', 'bg-secondary');
            }, 1500);
        });
    </script>
