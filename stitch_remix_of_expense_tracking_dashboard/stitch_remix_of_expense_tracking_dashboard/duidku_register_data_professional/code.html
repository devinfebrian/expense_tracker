                        "tertiary-fixed-dim": "#ffb2b7",

                        "tertiary": "#000000",
                        "on-secondary-fixed": "#002113",
                        "primary": "#000000",
                        "surface-variant": "#d3e4fe",
                        "surface-container-low": "#eff4ff",
                        "surface-container-highest": "#d3e4fe",
                        "surface-container-lowest": "#ffffff",
                        "primary-fixed": "#dae2fd",
                        "surface-dim": "#cbdbf5",
                        "inverse-surface": "#213145",
                        "secondary-container": "#6cf8bb",
                        "surface": "#f8f9ff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",

                    },
                    "spacing": {

                        "container-max": "1280px",

                        "gutter": "24px",

                    },
                    "fontFamily": {

                        "headline-lg": ["Hanken Grotesk"],

                    },
                    "fontSize": {
                        "data-md": ["14px", {"lineHeight": "18px", "fontWeight": "500"}],
                        "data-lg": ["20px", {"lineHeight": "24px", "fontWeight": "500"}],
                        "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],

                        "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],

                        "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600"}],

                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}]
                    }
                },
            },
        }
    }catch(_e){}</script></head><body class="bg-background text-on-background font-body-md min-h-screen flex flex-col">
<!-- Header Navigation -->
<header class="w-full px-lg py-md max-w-container-max mx-auto flex justify-between items-center">
<div class="font-headline-md text-headline-md font-bold text-on-background tracking-tight">
            Duidku
        </div>

</header>
<!-- Main Content: Registration Card -->
<main class="flex-grow flex items-center justify-center px-md py-2xl">
<div class="w-full max-w-[480px] bg-white border border-outline-variant p-xl shadow-sm">
<!-- Branding & Heading -->
<div class="text-center mb-xl">
<h1 class="font-headline-lg text-headline-lg text-primary mb-xs">Create Account</h1>

</div>
<form class="space-y-lg" id="registrationForm"><!-- Name Field -->
<div class="space-y-xs">
    <label class="block font-label-caps text-on-surface-variant" for="name">FULL NAME</label>
    <input class="w-full px-md py-md border border-outline-variant focus:outline-none focus:border-primary" id="name" placeholder="Enter your full name" required="" type="text">
</div>
<!-- Email Field -->
<div class="space-y-xs">
    <label class="block font-label-caps text-on-surface-variant" for="email">EMAIL ADDRESS</label>
    <input class="w-full px-md py-md border border-outline-variant focus:outline-none focus:border-primary" id="email" placeholder="name@company.com" required="" type="email">
</div>
<!-- Password Field -->
<div class="space-y-xs">
    <div class="flex justify-between items-center">
        <label class="block font-label-caps text-on-surface-variant" for="password">PASSWORD</label>
        <span class="font-label-caps text-[10px] text-on-primary-container" id="strengthText">STRENGTH</span>
    </div>
    <input class="w-full px-md py-md border border-outline-variant focus:outline-none focus:border-primary" id="password" placeholder="••••••••" required="" type="password">
    <!-- Strength Bar Container -->
    <div class="w-full h-1 bg-surface-container mt-xs">
        <div class="h-full transition-all duration-300" id="strengthBar" style="width: 0%"></div>
    </div>
</div><button class="w-full py-md bg-[#0F172A] text-white font-body-md font-semibold hover:opacity-90 transition-opacity flex justify-center items-center gap-sm" type="submit">Create Account</button></form><div class="mt-xl text-center">
    <p class="text-on-surface-variant">
        Already have an account? 
        <a class="text-primary font-semibold hover:underline" href="#">Log in</a>
    </p>
</div>
<!-- Security Reassurance -->

</div>
</main>
<!-- Footer -->
<footer class="w-full px-lg py-xl max-w-container-max mx-auto flex flex-col md:flex-row justify-between items-center gap-md border-outline-variant mt-auto" data-stitch-orig-opacity="0"></footer>
<script>
        // Password strength logic
        const passwordInput = document.getElementById('password');
        const strengthBar = document.getElementById('strengthBar');
        const strengthText = document.getElementById('strengthText');

        passwordInput.addEventListener('input', function() {
            const val = this.value;
            let score = 0;
            
            if (val.length > 0) score += 20;
            if (val.length >= 8) score += 20;
            if (/[A-Z]/.test(val)) score += 20;
            if (/[0-9]/.test(val)) score += 20;
            if (/[^A-Za-z0-9]/.test(val)) score += 20;

            strengthBar.style.width = score + '%';
            
            if (score <= 40) {
                strengthBar.className = 'strength-bar bg-error';
                strengthText.innerText = 'WEAK';
                strengthText.className = 'font-label-caps text-[10px] text-error';
            } else if (score <= 80) {
                strengthBar.className = 'strength-bar bg-on-tertiary-fixed-variant';
                strengthText.innerText = 'MEDIUM';
                strengthText.className = 'font-label-caps text-[10px] text-on-tertiary-fixed-variant';
            } else {
                strengthBar.className = 'strength-bar bg-on-secondary-container';
                strengthText.innerText = 'STRONG';
                strengthText.className = 'font-label-caps text-[10px] text-on-secondary-container';
            }
        });

        // Form Submission Micro-interaction
        document.getElementById('registrationForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = this.querySelector('button[type="submit"]');
            btn.disabled = true;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span> Creating...';
            
            setTimeout(() => {
                btn.innerHTML = '<span class="material-symbols-outlined">check_circle</span> Account Created';
                btn.classList.replace('bg-[#0F172A]', 'bg-on-secondary-container');
            }, 1500);
        });
    </script>
</body></html>
