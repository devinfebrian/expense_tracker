<body class="font-body-md text-on-surface selection:bg-primary-fixed selection:text-on-primary-fixed min-h-screen flex flex-col">
<!-- Header / TopAppBar -->

<!-- Welcome Message -->

<!-- Login Container -->
<div class="login-card w-full max-w-[400px] rounded-lg p-lg shadow-sm"><form action="#" class="space-y-lg"><div class="space-y-sm"><label for="email" class="block font-body-md font-semibold text-on-surface">Email Address</label><input type="email" id="email" name="email" placeholder="name@company.com" class="w-full px-md py-md rounded-lg border border-outline-variant bg-surface-container-lowest font-body-md focus:ring-2 focus:ring-primary-fixed outline-none transition-all" required=""></div><div class="space-y-sm"><div class="flex justify-between items-center"><label for="password" class="block font-body-md font-semibold text-on-surface">Password</label><a href="#" class="text-body-sm font-semibold text-secondary hover:underline">Forgot password?</a></div><div class="relative"><input type="password" id="password" name="password" placeholder="••••••••" class="w-full px-md py-md rounded-lg border border-outline-variant bg-surface-container-lowest font-body-md focus:ring-2 focus:ring-primary-fixed outline-none transition-all" required=""><button type="button" class="absolute right-md top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-on-surface"><span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span></button></div></div><button class="w-full bg-inverse-surface text-on-primary py-md font-body-md font-semibold rounded-lg hover:opacity-90 active:scale-[0.98] transition-all shadow-sm" type="submit">Sign In</button></form><div class="mt-xl text-center"><p class="font-body-md text-on-surface-variant">Don't have an account? <a href="#" class="font-semibold text-secondary hover:underline">Register Now</a></p></div></div>
<!-- Footer Links for Mobile -->

</main>
<!-- Global Footer -->

<!-- Simple Interaction Logic -->
<script>
        // Micro-interactions for form focus states
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('ring-2', 'ring-primary-fixed');
            });
            input.addEventListener('blur', () => {
                input.parentElement.classList.remove('ring-2', 'ring-primary-fixed');
            });
        });

        // Toggle Password Visibility
        const toggleBtn = document.querySelector('button span[data-icon="visibility"]');
        const passInput = document.getElementById('password');
        if (toggleBtn && passInput) {
            toggleBtn.parentElement.addEventListener('click', () => {
                const type = passInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passInput.setAttribute('type', type);
                toggleBtn.textContent = type === 'password' ? 'visibility' : 'visibility_off';
            });
        }
    </script>
